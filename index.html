<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Contabilità Familiare</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
<link rel="stylesheet" href="style.css?v=10">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header>
    <div class="header-left">
      <h1>🏠 Bilancio</h1>
    </div>
    <div class="month-selector">
      <button id="prevMonth">◀</button>
      <span id="currentMonth">--</span>
      <button id="nextMonth">▶</button>
    </div>
  </header>

  <!-- Alert Container (Dinamico) -->
  <div id="alert-box"></div>

  <main>
    <!-- KPI Dashboard -->
    <section class="dashboard">
      <div class="card kpi">
        <span>Cassa Reale</span>
        <strong id="kpiCassa">€ 0,00</strong>
      </div>
      <div class="card kpi">
        <span>Conguaglio</span>
        <strong id="kpiConguaglio">€ 0,00</strong>
      </div>
      <div class="card kpi">
        <span>Utile Net</span>
        <strong id="kpiUtile">€ 0,00</strong>
      </div>
    </section>

    <!-- Form Aggiunta Rapida -->
    <section class="input-panel">
      <div class="form-row">
        <select id="fTipo"><option value="entrata">Entrata</option><option value="uscita">Uscita</option></select>
        <select id="fCat"><option value="">Categoria...</option></select>
      </div>
      <div class="form-row">
        <select id="fMembro"><option value="Capo">Capo</option><option value="Moglie">Anna</option></select>
        <input type="number" id="fImporto" placeholder="€ Importo">
      </div>
      <div class="form-options">
        <label><input type="checkbox" id="fRicorrente">  Ricorrente</label>
        <label><input type="checkbox" id="fReale" checked> ✅ Reale</label>
      </div>
      <button id="btnAggiungi" class="btn-primary"> Aggiungi Movimento</button>
    </section>

    <!-- Vista Desktop (Tabella) -->
    <section class="table-panel desktop-only">
      <h2>📊 Movimenti</h2>
      <table id="transTable">
        <thead>
          <tr><th>Tipo</th><th>Categoria</th><th>Chi</th><th>Importo</th><th>Stato</th><th>Azioni</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- Vista Mobile (Lista Card) -->
    <section class="mobile-only" id="mobile-list">
      <h2>📊 Movimenti</h2>
      <div id="mobile-container"></div>
    </section>

    <!-- Riepilogo -->
    <section class="rollover-panel">
      <h2> Riepilogo</h2>
      <ul id="rolloverList"></ul>
      <div class="actions-row">
        <button id="btnExport" class="btn-secondary">📥 Esporta CSV</button>
      </div>
    </section>
  </main>

  <!-- Footer Spacer per Mobile -->
  <div class="mobile-spacer"></div>

  <script type="module" src="./modules/ui.js?v=9"></script>
</body>
</html>
